name: Keep Supabase alive

on:
  schedule:
    # Every 3 days at 04:00 UTC — well under Supabase's ~7 day free-tier
    # inactivity pause window.
    - cron: "0 4 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://jobwrap.app/api/health)
          echo "Health check responded with status $status"
          if [ "$status" -ge 400 ]; then
            exit 1
          fi
